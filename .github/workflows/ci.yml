name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install package
        run: python -m pip install -e . pytest
      - name: Run tests
        run: python -m pytest -q
      - name: Validate JSON artifacts
        run: |
          python -m json.tool schemas/agent-birth-request.json >/dev/null
          python -m json.tool schemas/agent-manifest.json >/dev/null
          python -m json.tool schemas/agent-lineage.json >/dev/null
          find examples -name '*.json' -print0 | xargs -0 -I{} python -m json.tool {} >/dev/null
